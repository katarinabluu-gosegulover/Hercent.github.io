<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis Review about ASI (Account Security Interface) Design Error</title>
<meta name="description" content="Inconsistent, Incomplete, and Insecure: A Survey of ASIs at USENIX Security 2026">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Montserrat:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09111f;
    --bg-soft: #0f172a;
    --line: rgba(148, 163, 184, 0.18);
    --card: rgba(8, 15, 29, 0.74);
    --white: #ffffff;
    --navy: #0f1f75;
    --navy-strong: #1d4ed8;
    --navy-light: #dbe5ff;
    --gray: #f8fafc;
    --text: #182033;
    --muted: #94a3b8;
    --red: #c62828;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    font-family: "Noto Sans KR", sans-serif;
    background:
      radial-gradient(circle at 50% -10%, rgba(59, 130, 246, 0.16), transparent 28%),
      linear-gradient(180deg, #020617, #081120 40%, #09111f 100%);
    color: #e2e8f0;
    padding: 24px 16px 56px;
  }

  .review-page {
    width: min(1200px, 100%);
    margin: 0 auto;
    display: grid;
    gap: 18px;
  }

  .review-topbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--card);
    box-shadow: 0 24px 60px rgba(2, 6, 23, 0.22);
  }

  .review-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }

  .badge,
  .meta-pill {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.06);
    color: #e2e8f0;
    text-decoration: none;
    font-size: 0.84rem;
  }

  .meta-pill {
    font-family: "IBM Plex Mono", Consolas, monospace;
    color: #bfdbfe;
  }

  .review-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .review-actions a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0 16px;
    border-radius: 12px;
    text-decoration: none;
    font-family: "IBM Plex Mono", Consolas, monospace;
    font-size: 0.82rem;
    border: 1px solid var(--line);
    transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
  }

  .action-primary {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
    border-color: rgba(96, 165, 250, 0.42);
  }

  .action-secondary {
    background: rgba(255, 255, 255, 0.08);
    color: #dbeafe;
  }

  .review-actions a:hover {
    transform: translateY(-1px);
  }

  .review-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .review-nav button,
  .review-controls button {
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.08);
    color: #cbd5e1;
    cursor: pointer;
    transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease, color 180ms ease;
  }

  .review-nav button {
    min-height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    font-size: 0.79rem;
    font-family: "IBM Plex Mono", Consolas, monospace;
    letter-spacing: 0.02em;
  }

  .review-nav button:hover,
  .review-nav button.is-active,
  .review-controls button:hover {
    background: #1d4ed8;
    border-color: #3b82f6;
    color: #fff;
    transform: translateY(-1px);
  }

  .slide-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 36px 100px rgba(2, 6, 23, 0.42);
    background: #ffffff;
  }

  .slide-host {
    width: 100%;
    height: 100%;
  }

  .review-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #aab4ca;
    font-size: 0.86rem;
    font-family: "IBM Plex Mono", Consolas, monospace;
  }

  .review-controls button {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .review-counter {
    min-width: 74px;
    text-align: center;
  }

  .slide {
    display: none;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  .slide.is-active {
    display: flex;
  }

  .slide-cover {
    background: var(--white);
    flex-direction: column;
  }

  .cover-top {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 6% 8%;
    position: relative;
  }

  .date {
    position: absolute;
    top: 7%;
    right: 8%;
    font-size: clamp(10px, 1.2vw, 14px);
    color: #64748b;
    font-weight: 700;
  }

  .cover-title,
  .toc-title,
  .content-header h2 {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    letter-spacing: -0.03em;
  }

  .cover-title {
    max-width: 82%;
    font-weight: 900;
    font-size: clamp(24px, 3.6vw, 46px);
    line-height: 1.14;
    color: var(--navy);
  }

  .cover-sub {
    margin-top: 12px;
    font-size: clamp(10px, 1.08vw, 13px);
    color: #64748b;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .cover-bottom {
    background: linear-gradient(135deg, #0f1f75, #1c358f);
    padding: 3% 8%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .author {
    color: #fff;
    font-weight: 700;
    font-size: clamp(10px, 1.25vw, 15px);
  }

  .conf {
    color: var(--navy-light);
    font-size: clamp(9px, 1vw, 12px);
  }

  .slide-toc {
    background: #ffffff;
    flex-direction: row;
  }

  .toc-left {
    width: 38%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8%;
  }

  .toc-label {
    font-family: "IBM Plex Mono", Consolas, monospace;
    font-size: clamp(8px, 1vw, 11px);
    color: #94a3b8;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .toc-title {
    font-weight: 900;
    font-size: clamp(18px, 2.8vw, 36px);
    color: var(--navy);
    line-height: 1.08;
  }

  .toc-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6% 8%;
    gap: 3%;
  }

  .toc-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 700;
    font-size: clamp(11px, 1.45vw, 18px);
    color: var(--navy);
  }

  .toc-bar {
    width: 4px;
    height: clamp(16px, 2vw, 24px);
    background: var(--navy);
    border-radius: 999px;
    flex-shrink: 0;
  }

  .slide-content,
  .slide-table {
    background: #ffffff;
    flex-direction: column;
  }

  .content-header {
    padding: 4.5% 8% 3%;
    border-bottom: 3px solid var(--navy);
  }

  .content-header h2 {
    font-weight: 900;
    font-size: clamp(14px, 2.2vw, 28px);
    color: var(--navy);
  }

  .content-body {
    flex: 1;
    padding: 3% 8%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2%;
  }

  .bullet {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: clamp(9px, 1.2vw, 14px);
    color: var(--text);
    line-height: 1.52;
  }

  .bullet-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--navy);
    margin-top: 0.5em;
    flex-shrink: 0;
  }

  .bullet.sub {
    padding-left: 22px;
    font-size: clamp(8px, 1.05vw, 12px);
    color: #475569;
  }

  .bullet.sub .bullet-dot {
    width: 5px;
    height: 5px;
    background: #94a3b8;
  }

  .bullet.red span,
  .highlight {
    color: var(--red);
    font-weight: 700;
  }

  .navy {
    color: var(--navy);
    font-weight: 700;
  }

  .two-col {
    display: flex;
    gap: 4%;
    flex: 1;
  }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2%;
  }

  .col-label {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 700;
    font-size: clamp(9px, 1.1vw, 13px);
    color: var(--navy);
    border-bottom: 2px solid var(--navy);
    padding-bottom: 4px;
    margin-bottom: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(7px, 0.9vw, 11px);
  }

  th {
    background: var(--navy);
    color: #fff;
    padding: 5px 8px;
    text-align: left;
    font-weight: 700;
  }

  td {
    padding: 4px 8px;
    border-bottom: 1px solid #e2e8f0;
    color: var(--text);
    vertical-align: top;
  }

  tr:nth-child(even) td {
    background: var(--gray);
  }

  .tag {
    display: inline-block;
    background: var(--navy);
    color: #fff;
    font-size: clamp(6px, 0.8vw, 9px);
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 700;
  }

  .stat-row {
    display: flex;
    gap: 3%;
    margin: 2% 0;
  }

  .stat-box {
    flex: 1;
    background: linear-gradient(135deg, #0f1f75, #1e40af);
    border-radius: 10px;
    padding: 4% 5%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 4px;
  }

  .stat-num {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: clamp(18px, 3vw, 40px);
    color: #fff;
  }

  .stat-desc {
    font-size: clamp(7px, 0.9vw, 11px);
    color: var(--navy-light);
    line-height: 1.34;
  }

  .principles {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2%;
    flex: 1;
  }

  .p-card {
    background: var(--gray);
    border-left: 4px solid var(--navy);
    border-radius: 8px;
    padding: 4% 5%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .p-num {
    font-family: "Montserrat", "Noto Sans KR", sans-serif;
    font-weight: 900;
    font-size: clamp(10px, 1.4vw, 16px);
    color: var(--navy);
  }

  .p-title {
    font-weight: 700;
    font-size: clamp(8px, 1vw, 12px);
    color: var(--navy);
  }

  .p-desc {
    font-size: clamp(7px, 0.85vw, 10px);
    color: #475569;
    line-height: 1.4;
  }

  .slide-num-badge {
    position: absolute;
    right: 4%;
    bottom: 3%;
    font-size: clamp(8px, 0.9vw, 11px);
    color: #94a3b8;
    font-family: "IBM Plex Mono", Consolas, monospace;
    font-weight: 700;
  }

  @media (max-width: 980px) {
    body {
      padding: 16px 10px 40px;
    }

    .slide-frame {
      aspect-ratio: auto;
      min-height: 74vh;
    }

    .slide.is-active {
      position: relative;
      min-height: 74vh;
    }

    .slide-toc,
    .two-col,
    .stat-row {
      flex-direction: column;
    }

    .toc-left,
    .toc-right,
    .content-body,
    .cover-top,
    .cover-bottom {
      padding: 24px;
    }

    .toc-left {
      width: 100%;
      padding-bottom: 0;
    }

    .cover-title {
      max-width: 100%;
    }

    .principles {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
  }

  @media (max-width: 640px) {
    .review-topbar {
      padding: 14px;
    }

    .review-nav {
      justify-content: flex-start;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .review-controls {
      gap: 12px;
    }

    .principles {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <main class="review-page">
    <section class="review-topbar">
      <div class="review-meta">
        <a class="badge" href="/Hercent.github.io/">Home</a>
        <a class="badge" href="/Hercent.github.io/categories/papers-conferences.html">논문/컨퍼런스</a>
        <span class="meta-pill">USENIX Security 2026</span>
        <span class="meta-pill">2026.04.24</span>
      </div>
      <div class="review-actions">
        <a class="action-primary" href="/Hercent.github.io/assets/docs/thesis-review-mission.pdf" target="_blank" rel="noreferrer">PDF</a>
        <a class="action-secondary" href="/Hercent.github.io/assets/docs/thesis-review-mission.pdf" download="thesis-review-mission.pdf">download</a>
      </div>
    </section>

    <section class="review-nav" id="reviewNav"></section>

    <section class="slide-frame">
      <div class="slide-host" id="slideHost"></div>
    </section>

    <section class="review-controls">
      <button type="button" id="prevSlide" aria-label="이전 슬라이드">&#8592;</button>
      <span class="review-counter" id="slideCounter">1 / 10</span>
      <button type="button" id="nextSlide" aria-label="다음 슬라이드">&#8594;</button>
    </section>
  </main>

  <script>
    const slides = [
      {
        label: "표지",
        html: `
        <div class="slide slide-cover is-active" id="slide-0">
          <div class="cover-top">
            <span class="date">2026.04.24.</span>
            <div class="cover-title">웹 서비스의 계정 보안 인터페이스(ASI)는<br>얼마나 믿을 수 있을까?</div>
            <div class="cover-sub">Paper Review · USENIX Security 2026</div>
            <div class="slide-num-badge">1 / 10</div>
          </div>
          <div class="cover-bottom">
            <div>
              <div class="author">고려대 스마트보안학부 김수민</div>
              <div class="conf">Bhattacharya et al. · Inconsistent, Incomplete, and Insecure: A Survey of ASIs</div>
            </div>
          </div>
        </div>`
      },
      {
        label: "목차",
        html: `
        <div class="slide slide-toc" id="slide-1">
          <div class="toc-left">
            <div class="toc-label">Table of Contents</div>
            <div class="toc-title">목차</div>
          </div>
          <div class="toc-right">
            <div class="toc-item"><div class="toc-bar"></div>논문 선정 이유 &amp; 문제 정의</div>
            <div class="toc-item"><div class="toc-bar"></div>배경 &amp; 기존 연구의 한계</div>
            <div class="toc-item"><div class="toc-bar"></div>핵심 아이디어 &amp; 방법론</div>
            <div class="toc-item"><div class="toc-bar"></div>ASI 유형론(Typology)</div>
            <div class="toc-item"><div class="toc-bar"></div>실험 결과 &amp; 스푸핑 취약성</div>
            <div class="toc-item"><div class="toc-bar"></div>6가지 개선 원칙</div>
            <div class="toc-item"><div class="toc-bar"></div>한계점 &amp; 앞으로 해볼 것</div>
          </div>
          <div class="slide-num-badge">2 / 10</div>
        </div>`
      },
      {
        label: "문제 정의",
        html: `
        <div class="slide slide-content" id="slide-2">
          <div class="content-header"><h2>논문 선정 이유 &amp; 문제 정의</h2></div>
          <div class="content-body">
            <div class="bullet"><div class="bullet-dot"></div><span><span class="navy">왜 이 논문인가?</span> 구글·페이스북 계정의 "최근 로그인 기기" 메뉴 — 실제로 얼마나 믿을 수 있는가? 직접 경험한 의문에서 출발</span></div>
            <div class="bullet"><div class="bullet-dot"></div><span><span class="navy">ASI(Account Security Interface)</span>란 로그인 기록, 연결 기기 목록, 보안 알림 등 무단 접근을 사용자 스스로 감지하도록 돕는 인터페이스</span></div>
            <div class="bullet"><div class="bullet-dot"></div><span><span class="navy">핵심 질문:</span> 실제 100개 인기 서비스의 ASI는 제대로 설계·구현되어 있는가?</span></div>
            <div class="bullet"><div class="bullet-dot"></div><span>특히 <span class="highlight">대인 폭력(intimate partner abuse)</span> 상황에서 피해자가 계정 침해를 스스로 탐지할 수 있는 유일한 수단이 ASI</span></div>
            <div class="bullet"><div class="bullet-dot"></div><span>USENIX Security 2026 게재 — 스푸핑 공격이라는 실제 위협과 직결된 실험 포함</span></div>
          </div>
          <div class="slide-num-badge">3 / 10</div>
        </div>`
      },
      {
        label: "배경",
        html: `
        <div class="slide slide-content" id="slide-3">
          <div class="content-header"><h2>배경 &amp; 기존 연구의 한계</h2></div>
          <div class="content-body">
            <div class="bullet"><div class="bullet-dot"></div><span><span class="navy">Daffalla et al. (2023)</span>이 선행 연구로 Google, Apple, Facebook, WhatsApp 4개 서비스 분석 → 범위 협소, 일반화 불가</span></div>
            <div class="bullet"><div class="bullet-dot"></div><span>기존 연구는 "알림을 어떻게 더 잘 보낼까"에 집중 — <span class="highlight">ASI 자체의 설계 결함·보안 취약성은 비어 있었음</span></span></div>
            <div class="bullet"><div class="bullet-dot"></div><span>강력한 인증 수단(패스키, MFA)이 있어도 이미 접근이 허용된 상황이라면 소용없음 → 침해 탐지 도구의 질이 중요</span></div>
            <div class="bullet red"><div class="bullet-dot"></div><span>스푸핑·접근 숨기기(access hiding) 공격에 ASI가 얼마나 취약한지 체계적으로 측정한 연구가 없었음</span></div>
          </div>
          <div class="slide-num-badge">4 / 10</div>
        </div>`
      },
      {
        label: "방법론",
        html: `
        <div class="slide slide-content" id="slide-4">
          <div class="content-header"><h2>핵심 아이디어 &amp; 방법론</h2></div>
          <div class="content-body">
            <div class="bullet"><div class="bullet-dot"></div><span><span class="navy">100개 인기 서비스</span>(TRANCO 기준)를 직접 손으로 조사 — 역대 최대 규모 ASI 실측 연구</span></div>
            <div class="bullet"><div class="bullet-dot"></div><span><span class="navy">피해자 기기 + 공격자 기기</span> 2대를 사용해 실제 스푸핑 시나리오 재현</span></div>
            <div class="bullet sub"><div class="bullet-dot"></div><span>① VPN + SOCKS 프록시 → 위치 정보 위조</span></div>
            <div class="bullet sub"><div class="bullet-dot"></div><span>② HTTP User-Agent 문자열 변조 → 기기·브라우저 정보 위조</span></div>

    const host = document.getElementById("slideHost");
    const nav = document.getElementById("reviewNav");
    const counter = document.getElementById("slideCounter");
    const prev = document.getElementById("prevSlide");
    const next = document.getElementById("nextSlide");
    const total = slides.length;
    let current = 0;

    slides.forEach((slide, index) => {
      host.insertAdjacentHTML("beforeend", slide.html);

      const button = document.createElement("button");
      button.type = "button";
      button.textContent = slide.label;
      button.addEventListener("click", () => goTo(index));

      if (index === 0) {
        button.classList.add("is-active");
      }

      nav.appendChild(button);
    });

    const slideEls = Array.from(host.querySelectorAll(".slide"));
    const navButtons = Array.from(nav.querySelectorAll("button"));

    function goTo(nextIndex) {
      slideEls.forEach((slide, index) => {
        slide.classList.toggle("is-active", index === nextIndex);
      });

      navButtons.forEach((button, index) => {
        button.classList.toggle("is-active", index === nextIndex);
      });

      counter.textContent = `${nextIndex + 1} / ${total}`;
      current = nextIndex;
    }

    function changeSlide(direction) {
      goTo((current + direction + total) % total);
    }

    prev.addEventListener("click", () => changeSlide(-1));
    next.addEventListener("click", () => changeSlide(1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "ArrowDown") {
        changeSlide(1);
      }

      if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
        changeSlide(-1);
      }
    });

    goTo(0);
  </script>
