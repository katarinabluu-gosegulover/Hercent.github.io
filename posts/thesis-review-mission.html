<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thesis Review about ASI (Account Security Interface) Design Error</title>
<meta name="description" content="ASI(Account Security Interface 에 관한 논문 리뷰">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08101d;
    --panel: rgba(9, 16, 29, 0.82);
    --line: rgba(148, 163, 184, 0.16);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #2563eb;
    --accent-soft: #bfdbfe;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    padding: 24px 16px 56px;
    color: var(--text);
    font-family: "IBM Plex Sans KR", sans-serif;
    background:
      radial-gradient(circle at 50% -10%, rgba(37, 99, 235, 0.18), transparent 30%),
      linear-gradient(180deg, #020617, #08101d 44%, #09111f 100%);
  }

  .review-page {
    width: min(1280px, 100%);
    margin: 0 auto;
    display: grid;
    gap: 18px;
  }

  .review-topbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--panel);
    box-shadow: 0 24px 60px rgba(2, 6, 23, 0.22);
  }

  .review-meta,
  .review-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }

  .badge,
  .meta-pill,
  .review-actions a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    text-decoration: none;
    font-size: 0.84rem;
  }

  .badge,
  .meta-pill {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
  }

  .meta-pill {
    color: var(--accent-soft);
    font-family: "IBM Plex Mono", Consolas, monospace;
  }

  .review-actions a {
    font-family: "IBM Plex Mono", Consolas, monospace;
    transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
  }

  .action-primary {
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
    border-color: rgba(96, 165, 250, 0.42);
  }

  .action-secondary {
    background: rgba(255, 255, 255, 0.08);
    color: #dbeafe;
  }

  .review-actions a:hover,
  .review-nav button:hover,
  .review-controls button:hover {
    transform: translateY(-1px);
  }

  .review-nav {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .review-nav::-webkit-scrollbar {
    height: 8px;
  }

  .review-nav::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.3);
    border-radius: 999px;
  }

  .review-nav button,
  .review-controls button {
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.08);
    color: #cbd5e1;
    cursor: pointer;
    transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease, color 180ms ease;
  }

  .review-nav button {
    flex: 0 0 auto;
    min-width: 58px;
    min-height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-family: "IBM Plex Mono", Consolas, monospace;
  }

  .review-nav button.is-active,
  .review-controls button:hover,
  .review-nav button:hover {
    background: var(--accent);
    border-color: #3b82f6;
    color: #fff;
  }

  .slide-frame {
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    border: 1px solid var(--line);
    background: #030712;
    box-shadow: 0 36px 100px rgba(2, 6, 23, 0.42);
  }

  .slide {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #030712;
  }

  .slide.is-active {
    display: flex;
  }

  .slide-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(2, 6, 23, 0.34);
    background: #030712;
  }

  .review-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    color: var(--muted);
    font-size: 0.86rem;
    font-family: "IBM Plex Mono", Consolas, monospace;
  }

  .review-controls button {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .review-counter {
    min-width: 82px;
    text-align: center;
  }

  .review-note {
    color: var(--muted);
    font-size: 0.88rem;
    text-align: center;
  }

  @media (max-width: 980px) {
    body {
      padding: 16px 10px 40px;
    }

    .slide-frame {
      aspect-ratio: auto;
      min-height: 72vh;
    }

    .slide {
      padding: 10px;
    }
  }
</style>
</head>
<body>
  <main class="review-page">
    <section class="review-topbar">
      <div class="review-meta">
        <a class="badge" href="/Hercent.github.io/">Home</a>
        <a class="badge" href="/Hercent.github.io/categories/papers-conferences.html">논문/컨퍼런스</a>
        <span class="meta-pill">18 pages</span>
        <span class="meta-pill">2026.04.24</span>
      </div>
      <div class="review-actions">
        <a class="action-primary" href="/Hercent.github.io/assets/docs/thesis-review-mission.pdf?v=20260425-18" target="_blank" rel="noreferrer">PDF</a>
        <a class="action-secondary" href="/Hercent.github.io/assets/docs/thesis-review-mission.pdf?v=20260425-18" download="thesis-review-mission.pdf">download</a>
      </div>
    </section>

    <section class="review-nav" id="reviewNav">
      <button type="button" class="is-active" data-slide-target="0">01</button>
    </section>

    <section class="slide-frame" id="slideFrame">
      <section class="slide is-active" data-slide-index="0">
        <img class="slide-image" src="/Hercent.github.io/assets/images/thesis-review-mission-pages/page-01.webp?v=20260425-18" alt="Thesis Review Mission page 1" fetchpriority="high">
      </section>
    </section>

    <section class="review-controls">
      <button type="button" id="prevSlide" aria-label="이전 페이지">&#8592;</button>
      <span class="review-counter" id="slideCounter">1 / 18</span>
      <button type="button" id="nextSlide" aria-label="다음 페이지">&#8594;</button>
    </section>
  </main>

  <script>
    const TOTAL_PAGES = 18;
    const ASSET_VERSION = "20260425-18";
    const slideFrame = document.getElementById("slideFrame");
    const reviewNav = document.getElementById("reviewNav");
    const counter = document.getElementById("slideCounter");
    const prev = document.getElementById("prevSlide");
    const next = document.getElementById("nextSlide");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    for (let page = 2; page <= TOTAL_PAGES; page += 1) {
      const index = page - 1;

      const button = document.createElement("button");
      button.type = "button";
      button.dataset.slideTarget = String(index);
      button.textContent = pad(page);
      reviewNav.appendChild(button);

      const slide = document.createElement("section");
      slide.className = "slide";
      slide.dataset.slideIndex = String(index);
      slide.innerHTML = `<img class="slide-image" src="/Hercent.github.io/assets/images/thesis-review-mission-pages/page-${pad(page)}.webp?v=${ASSET_VERSION}" alt="Thesis Review Mission page ${page}" loading="lazy">`;
      slideFrame.appendChild(slide);
    }

    const slideEls = Array.from(document.querySelectorAll("[data-slide-index]"));
    const navButtons = Array.from(document.querySelectorAll("[data-slide-target]"));
    const total = slideEls.length;
    let current = 0;

    function goTo(nextIndex) {
      current = Math.max(0, Math.min(nextIndex, total - 1));

      slideEls.forEach((slide, index) => {
        slide.classList.toggle("is-active", index === current);
      });

      navButtons.forEach((button, index) => {
        button.classList.toggle("is-active", index === current);
      });

      counter.textContent = `${current + 1} / ${total}`;
    }

    function changeSlide(direction) {
      goTo((current + direction + total) % total);
    }

    navButtons.forEach((button) => {
      button.addEventListener("click", () => {
        goTo(Number(button.dataset.slideTarget));
      });
    });

    prev.addEventListener("click", () => changeSlide(-1));
    next.addEventListener("click", () => changeSlide(1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "ArrowDown") {
        changeSlide(1);
      }

      if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
        changeSlide(-1);
      }
    });

    goTo(0);
  </script>
</body>
</html>
